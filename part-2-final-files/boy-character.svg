<svg id="boy-character" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg" style="width: 100%; max-width: 250px; filter: drop-shadow(0 8px 24px rgba(56, 189, 248, 0.3));">
  <!-- Body -->
  <ellipse cx="100" cy="180" rx="45" ry="60" fill="#4A90E2"/>
  
  <!-- Neck -->
  <rect x="85" y="110" width="30" height="25" fill="#F4A460"/>
  
  <!-- Head -->
  <circle cx="100" cy="80" r="50" fill="#F4A460"/>
  
  <!-- Hair -->
  <path d="M 50 50 Q 50 20 100 15 Q 150 20 150 50 Q 150 60 140 65 Q 160 40 160 50 Q 160 15 100 5 Q 40 15 40 50" fill="#2C3E50"/>
  
  <!-- Left Eye White -->
  <circle cx="75" cy="70" r="12" fill="white"/>
  
  <!-- Right Eye White -->
  <circle cx="125" cy="70" r="12" fill="white"/>
  
  <!-- Left Eye Pupil -->
  <circle class="eye-pupil left-pupil" cx="75" cy="70" r="7" fill="#2C3E50"/>
  
  <!-- Right Eye Pupil -->
  <circle class="eye-pupil right-pupil" cx="125" cy="70" r="7" fill="#2C3E50"/>
  
  <!-- Left Eye Shine -->
  <circle cx="72" cy="67" r="3" fill="white" opacity="0.8"/>
  
  <!-- Right Eye Shine -->
  <circle cx="122" cy="67" r="3" fill="white" opacity="0.8"/>
  
  <!-- Nose -->
  <polygon points="100,85 95,95 105,95" fill="#E8956E"/>
  
  <!-- Mouth -->
  <path d="M 85 105 Q 100 115 115 105" stroke="#E85D5D" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Left Arm -->
  <rect x="50" y="140" width="20" height="70" rx="10" fill="#F4A460" transform="rotate(-20 60 140)"/>
  
  <!-- Right Arm -->
  <rect x="130" y="140" width="20" height="70" rx="10" fill="#F4A460" transform="rotate(20 140 140)"/>
  
  <!-- Left Hand -->
  <circle cx="45" cy="200" r="10" fill="#F4A460"/>
  
  <!-- Right Hand -->
  <circle cx="155" cy="200" r="10" fill="#F4A460"/>
  
  <!-- Left Leg -->
  <rect x="80" y="230" width="15" height="50" rx="7" fill="#2C3E50"/>
  
  <!-- Right Leg -->
  <rect x="105" y="230" width="15" height="50" rx="7" fill="#2C3E50"/>
  
  <!-- Left Foot -->
  <ellipse cx="87" cy="285" rx="12" ry="8" fill="#1A1A1A"/>
  
  <!-- Right Foot -->
  <ellipse cx="112" cy="285" rx="12" ry="8" fill="#1A1A1A"/>
  
  <!-- Blush (optional) -->
  <circle cx="55" cy="90" r="8" fill="#FFB6C1" opacity="0.6"/>
  <circle cx="145" cy="90" r="8" fill="#FFB6C1" opacity="0.6"/>
</svg>
